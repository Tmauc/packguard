# Release pipeline — fires on `v*` tags and on `workflow_dispatch` for
# dry-runs. Produces:
#   - 5 platform binaries (darwin x64/arm64, linux x64/arm64, windows x64)
#     bundled as `.tar.gz` (or `.zip` on windows) with a colocated
#     `.sha256` checksum file per artifact, ui-embed activated so the
#     dashboard is served from the binary alone.
#   - An aggregate SHA256SUMS file committed to the GitHub release for
#     `install.sh` to verify against.
#   - Multi-arch Docker image (`linux/amd64`, `linux/arm64`) tagged
#     `:<version>` and `:latest`, pushed to both Docker Hub and the
#     GitHub Container Registry.
#   - A cosign signature per artifact — gated on COSIGN_PRIVATE_KEY
#     being set. Until the key exists the step no-ops loudly so the
#     workflow never turns red on missing-secret.
#   - A Trivy scan of the Docker image published to the Security tab
#     so no release ships a known-vuln base layer.
#
# Secrets expected (see PUBLISHING.md):
#   CRATES_IO_TOKEN        — only used by the post-release `cargo publish`
#                            step, which is skipped unless manually enabled.
#   DOCKERHUB_USERNAME     }  both required for the docker push job;
#   DOCKERHUB_TOKEN        }  job no-ops if either is missing.
#   COSIGN_PRIVATE_KEY     }  both optional; signature step is skipped
#   COSIGN_PASSWORD        }  if absent, a warning is emitted.
#
# Local dry-run:
#   act -j build-binaries --eventpath <(echo '{"ref":"refs/tags/v0.1.0-test"}')
#   gh workflow run release.yml --ref main -f dry_run=true

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build all artefacts but skip publish + push steps"
        required: false
        default: "true"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: packguard

jobs:
  # ------------------------------------------------------------------
  # Fail-fast version check: the tag and the workspace must agree.
  # ------------------------------------------------------------------
  version-sanity:
    name: version · sanity
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: check
        id: check
        run: |
          set -euo pipefail
          WS_VERSION=$(grep -E '^version[[:space:]]*=' Cargo.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          echo "workspace.package.version: ${WS_VERSION}"
          echo "tag:                       ${TAG} (stripped: ${TAG_VERSION})"
          if [ "$WS_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::workspace version '${WS_VERSION}' does not match tag '${TAG_VERSION}'. Update Cargo.toml (or use ./scripts/bump-version.sh) and retag before releasing."
            exit 1
          fi
          echo "version=${WS_VERSION}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # 5 platform binaries — ui-embed ON, stripped, checksummed.
  # ------------------------------------------------------------------
  build-binaries:
    name: build · ${{ matrix.target }}
    needs: version-sanity
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: build dashboard (shared by all targets)
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross toolchain (linux arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        shell: bash
        env:
          PACKGUARD_SKIP_UI_BUILD: "1"
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p packguard-cli --features ui-embed

      - name: package
        id: package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          STAGE="${BIN_NAME}-${VERSION}-${TARGET}"
          mkdir "$STAGE"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "target/${TARGET}/release/${BIN_NAME}.exe" "$STAGE/"
          else
            cp "target/${TARGET}/release/${BIN_NAME}" "$STAGE/"
          fi
          cp README.md LICENSE* "$STAGE/" 2>/dev/null || true
          if [[ "$ARCHIVE" == "zip" ]]; then
            ASSET="${STAGE}.zip"
            7z a "$ASSET" "$STAGE"
          else
            ASSET="${STAGE}.tar.gz"
            tar czf "$ASSET" "$STAGE"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "${ASSET}.sha256"
          else
            shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          fi
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"
          echo "sha256=${ASSET}.sha256" >> "$GITHUB_OUTPUT"

      - name: install cosign
        if: env.COSIGN_PRIVATE_KEY != ''
        uses: sigstore/cosign-installer@v3.7.0
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

      - name: sign (cosign, optional)
        if: env.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          ASSET: ${{ steps.package.outputs.asset }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign-blob --yes --key cosign.key \
            --output-signature "${ASSET}.sig" \
            --bundle "${ASSET}.bundle" \
            "$ASSET"
          rm -f cosign.key

      - name: sign (skipped — no COSIGN_PRIVATE_KEY)
        if: env.COSIGN_PRIVATE_KEY == ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          echo "::warning::COSIGN_PRIVATE_KEY not set — skipping signature for ${{ steps.package.outputs.asset }}. See PUBLISHING.md §cosign."

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.sha256 }}
            ${{ steps.package.outputs.asset }}.sig
            ${{ steps.package.outputs.asset }}.bundle
          if-no-files-found: warn

  # ------------------------------------------------------------------
  # Aggregate checksum file + GitHub Release draft.
  # ------------------------------------------------------------------
  publish-release:
    name: publish · GitHub Release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: aggregate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          find . -name '*.sha256' -exec cat {} + | sort > SHA256SUMS
          cat SHA256SUMS
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.sig
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          make_latest: "true"

  # ------------------------------------------------------------------
  # Regenerate the Homebrew formula in the tap repo with new SHA256s.
  # Skipped entirely if HOMEBREW_TAP_TOKEN is not set.
  # ------------------------------------------------------------------
  update-homebrew-formula:
    name: update · homebrew formula
    needs: [publish-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: skip if no tap token
        id: gate
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping formula update"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          path: packguard

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          repository: Tmauc/homebrew-packguard
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          path: dist/

      - name: regenerate Formula/packguard.rb
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Re-aggregate the per-artifact SHA256s (same pattern as publish-release)
          cd dist
          find . -name '*.sha256' -exec cat {} + | sort > SHA256SUMS
          cat SHA256SUMS

          # shasum / sha256sum output: "<hash><2 spaces or ' *'><filename>"
          # grep by trailing filename, pick first field = hash.
          darwin_arm=$(grep -E 'aarch64-apple-darwin\.tar\.gz$'        SHA256SUMS | awk '{print $1}')
          darwin_x64=$(grep -E 'x86_64-apple-darwin\.tar\.gz$'         SHA256SUMS | awk '{print $1}')
          linux_arm=$( grep -E 'aarch64-unknown-linux-gnu\.tar\.gz$'   SHA256SUMS | awk '{print $1}')
          linux_x64=$( grep -E 'x86_64-unknown-linux-gnu\.tar\.gz$'    SHA256SUMS | awk '{print $1}')

          for v in "$darwin_arm" "$darwin_x64" "$linux_arm" "$linux_x64"; do
            if [ -z "$v" ]; then
              echo "::error::one of the platform SHA256 hashes came back empty"
              exit 1
            fi
          done

          cd ..
          mkdir -p tap/Formula
          sed \
            -e "s/RELEASE_VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/RELEASE_SHA256_DARWIN_ARM64_PLACEHOLDER/${darwin_arm}/g" \
            -e "s/RELEASE_SHA256_DARWIN_X64_PLACEHOLDER/${darwin_x64}/g" \
            -e "s/RELEASE_SHA256_LINUX_ARM64_PLACEHOLDER/${linux_arm}/g" \
            -e "s/RELEASE_SHA256_LINUX_X64_PLACEHOLDER/${linux_x64}/g" \
            packguard/packaging/homebrew/packguard.rb \
            > tap/Formula/packguard.rb

      - name: commit + push tap
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          cd tap
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/packguard.rb
          if git diff --cached --quiet; then
            echo "formula already up-to-date for v${VERSION}"
            exit 0
          fi
          git commit -m "feat: packguard v${VERSION} formula (auto-generated)"
          git push

  # ------------------------------------------------------------------
  # Multi-arch Docker image. Job no-ops cleanly if Docker Hub creds are
  # missing so a dry-run from a fresh fork still builds + scans without
  # needing secrets.
  # ------------------------------------------------------------------
  docker:
    name: docker · buildx + push
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: docker hub login (if creds present)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: ghcr login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: tags
        id: tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_LC="${GITHUB_REPOSITORY,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          {
            echo "version=${VERSION}"
            echo "ghcr=ghcr.io/${REPO_LC}"
          } >> "$GITHUB_OUTPUT"
          # tag list as heredoc (build-push reads multi-line input and drops empty lines)
          {
            echo 'tags<<EOF'
            echo "ghcr.io/${REPO_LC}:${VERSION}"
            echo "ghcr.io/${REPO_LC}:latest"
            if [ -n "${DOCKERHUB_USERNAME:-}" ]; then
              echo "${DOCKERHUB_USERNAME}/${REPO_NAME}:${VERSION}"
              echo "${DOCKERHUB_USERNAME}/${REPO_NAME}:latest"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push to ghcr always; push to Docker Hub only if creds present.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.tags.outputs.ghcr }}:${{ steps.tags.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: upload trivy sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
