# PackGuard policy — conservative defaults generated by `packguard init`.
# Full format reference: CONTEXT.md §6.

defaults:
  offset: -1                # one major behind latest
  allow_patch: true
  allow_security_patch: true
  stability: stable         # skip prereleases / alphas / betas
  min_age_days: 7           # ignore releases younger than a week
  block:
    cve_severity: [high, critical]
    malware: true
    deprecated: true
    yanked: true

# Examples (uncomment and adapt):
#
# overrides:
#   - match: "react"
#     offset: 0
#   - match: "lodash"
#     pin: "4.17.21"
#   - match: "@babel/*"
#     offset: -2
#
# groups:
#   - name: security-critical
#     match: ["jsonwebtoken", "bcrypt*", "@auth/*"]
#     offset: 0
#     min_age_days: 0
