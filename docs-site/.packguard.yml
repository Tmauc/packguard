# PackGuard policy — conservative defaults generated by `packguard init`.
# Full format reference: CONTEXT.md §6
# Offset semantics:         https://packguard-docs.vercel.app/concepts/offset-policy

defaults:
  # Three-axis offset (Phase 9b). Each key is a non-positive integer —
  # "how many steps below the latest {major,minor,patch}". Missing keys
  # default to 0.
  #
  # The default below expresses the canonical security posture:
  # "stay on latest major, one minor behind, always pick the latest patch".
  # Patches are overwhelmingly bug + security fixes, so we always want them;
  # minors sometimes carry regressions, so we let them bake for one cycle.
  offset:
    major: 0      # latest major
    minor: -1     # one minor behind on that major
    patch: 0      # latest patch (pick up security fixes)
  allow_patch: true
  allow_security_patch: true
  stability: stable         # skip prereleases / alphas / betas
  min_age_days: 7           # ignore releases younger than a week
  block:
    cve_severity: [high, critical]
    malware: true
    deprecated: true
    yanked: true
    typosquat: warn          # warn | strict | off

# Examples (uncomment and adapt):
#
# overrides:
#   - match: "react"
#     offset: { major: 0, minor: 0, patch: 0 }    # always latest
#   - match: "lodash"
#     pin: "4.17.21"
#   - match: "@babel/*"
#     offset: { major: -1 }                       # one major behind
#
# groups:
#   - name: security-critical
#     match: ["jsonwebtoken", "bcrypt*", "@auth/*"]
#     offset: { major: 0, minor: 0, patch: 0 }    # always latest
#     min_age_days: 0
